{% extends "base.html" %}
{% block title %}Новый запрос на изменение{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Запрос на изменение</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Требование (из базовой версии) *</label>
                <select name="requirement_id" class="form-select" required>
                    <option value="">Выберите...</option>
                    {% for req in requirements %}
                    <option value="{{ req.id }}">{{ req.system_id }} — {{ req.title | truncate(50) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Обоснование изменения *</label>
                <textarea name="justification" class="form-control" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание изменений *</label>
                <textarea name="changes_description" class="form-control" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Назначить рецензенту</label>
                <select name="assigned_to" class="form-select">
                    <option value="">— Не назначать —</option>
                    {% for u in users %}
                    <option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Создать запрос</button>
                <a href="{{ url_for('changes.list_change_requests', project_id=project.id) }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
