{% extends "base.html" %}
{% block title %}Новая базовая версия{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2>Создание базовой версии</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Название *</label>
                <input type="text" name="name" class="form-control" required placeholder="Например: v1.0">
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Требования для включения *</label>
                <div class="border rounded p-2" style="max-height:300px;overflow-y:auto">
                    {% for req in requirements %}
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="requirement_ids"
                               value="{{ req.id }}" id="req_{{ req.id }}">
                        <label class="form-check-label" for="req_{{ req.id }}">
                            <code>{{ req.system_id }}</code> — {{ req.title | truncate(60) }}
                            <span class="badge bg-secondary">{{ req.status }}</span>
                        </label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Создать</button>
                <a href="{{ url_for('changes.list_baselines', project_id=project.id) }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
