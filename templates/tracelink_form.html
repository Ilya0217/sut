{% extends "base.html" %}
{% block title %}Новая связь{% endblock %}
{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('main.index') }}">Проекты</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('tracelinks.list_tracelinks', project_id=project.id) }}">Связи</a></li>
        <li class="breadcrumb-item active">Новая связь</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Новая связь трассировки</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Исходное требование *</label>
                <select name="source_id" class="form-select" required>
                    <option value="">Выберите...</option>
                    {% for req in requirements %}
                    <option value="{{ req.id }}">{{ req.system_id }} — {{ req.title | truncate(50) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Целевое требование *</label>
                <select name="target_id" class="form-select" required>
                    <option value="">Выберите...</option>
                    {% for req in requirements %}
                    <option value="{{ req.id }}">{{ req.system_id }} — {{ req.title | truncate(50) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Тип связи *</label>
                <select name="link_type" class="form-select" required>
                    {% for lt in link_types %}
                    <option value="{{ lt }}">{{ lt }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="2"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Создать</button>
                <a href="{{ url_for('tracelinks.list_tracelinks', project_id=project.id) }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
